# Copy this file to profiles/local.conf and edit it for a different Intel Mac.
# Unknown models are intentionally blocked unless ALLOW_UNTESTED_MODEL=1 is set.

PROFILE_NAME="Custom Intel Mac"
PROFILE_MODEL="replace-with-hw.model"
PROFILE_MACOS_BUILD="replace-with-sw-vers-build"

INSTALL_FREQUENCY_UNLOCKER=0
STAGE_PLATFORM_PATCH=0
INSTALL_FAN_DAEMON=1

SYSTEM_VOLUME="${SYSTEM_VOLUME:-disk1s1}"

# FAN_MODE can be "fan" for one fan or "all" for every detected fan.
FAN_MODE="fan"
FAN_INDEX=0
FAN_BASE_RPM=1700
FAN_INTERVAL_SEC=5
