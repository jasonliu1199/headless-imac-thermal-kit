# Profile confirmed on one headless iMac18,3 running macOS 13.7.8 build 22H730.

PROFILE_NAME="iMac18,3 Ventura headless thermal fix"
PROFILE_MODEL="iMac18,3"
PROFILE_MACOS_BUILD="22H730"

INSTALL_FREQUENCY_UNLOCKER=1
STAGE_PLATFORM_PATCH=1
INSTALL_FAN_DAEMON=1

SYSTEM_VOLUME="${SYSTEM_VOLUME:-disk1s1}"
FAN_MODE="fan"
FAN_INDEX=0
FAN_BASE_RPM=1650
FAN_INTERVAL_SEC=5
